version: '3.8'

services:
  good-film-app:
    image: node:20-alpine
    container_name: good-film-app
    restart: unless-stopped
    command: sh -c "npm ci --omit=dev && node server.js"
    working_dir: /app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-oil1234}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://goodfilmshop.com,https://www.goodfilmshop.com,https://nas.goodfilmshop.com,https://app.goodfilmshop.com}
    volumes:
      - ./:/app

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: good-film-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - good-film-app
