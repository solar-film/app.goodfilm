version: '3.8'

services:
  good-film-app:
    build: .
    container_name: good-film-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./db.json:/app/db.json
      - ./public:/app/public
      - ./server.js:/app/server.js

  cloudflared:
