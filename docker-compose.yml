    container_name: good-film-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiYmI0ODI4MmQwMjkyMTY4ZmEyODUxYjQ3M2I1N2YzMjciLCJ0IjoiZTA4ZDgzYzMtMTA5MC00ODEzLWI2NjgtMjJhNDI1MWZjYjcxIiwicyI6IllqRm1PRFF4T0RVdE5UUTJPQzAwWWpRd0xXSmxOakV0WXpCaU1HRTBZamM0TkdJdyJ9
    depends_on:
      - good-film-app
